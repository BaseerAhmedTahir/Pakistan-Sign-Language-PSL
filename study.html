<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PSL Avatar Comprehension Study</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      #app canvas {
        display: block;
      }
      .study-panel {
        position: fixed;
        top: 14px;
        right: 14px;
        bottom: 14px;
        width: 320px;
        z-index: 10;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 12px;
        padding: 16px;
        box-shadow: 0 2px 14px rgba(0, 0, 0, 0.08);
      }
      h2 {
        font-size: 15px;
        margin: 0;
        color: #1a1c20;
      }
      h2 a {
        font-size: 12px;
        font-weight: 500;
        float: right;
      }
      p,
      label {
        font-size: 13px;
        color: #3a3f47;
        margin: 0;
        line-height: 1.45;
      }
      .muted {
        color: #7a808a;
        font-size: 12px;
      }
      input[type="text"],
      select,
      textarea {
        font: inherit;
        font-size: 13px;
        padding: 7px 9px;
        border: 1px solid rgba(0, 0, 0, 0.15);
        border-radius: 7px;
        width: 100%;
        box-sizing: border-box;
      }
      textarea {
        resize: vertical;
        min-height: 60px;
      }
      .s-btn {
        font: inherit;
        font-size: 13.5px;
        font-weight: 550;
        color: #1a1c20;
        background: #f2f3f5;
        border: 1px solid rgba(0, 0, 0, 0.12);
        border-radius: 8px;
        padding: 9px 14px;
        cursor: pointer;
      }
      .s-btn:hover:not(:disabled) {
        background: #e8eaee;
      }
      .s-btn:disabled {
        opacity: 0.45;
        cursor: default;
      }
      .s-btn.primary {
        background: #0f62d6;
        border-color: #0f62d6;
        color: #fff;
      }
      .s-btn.choice {
        text-align: left;
        width: 100%;
      }
      .s-btn.choice.selected {
        background: #0f62d6;
        border-color: #0f62d6;
        color: #fff;
      }
      .s-row {
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .s-rating {
        display: flex;
        gap: 5px;
        justify-content: space-between;
      }
      .s-rating .s-btn {
        flex: 1;
        padding: 9px 0;
        text-align: center;
      }
      .progress {
        font-size: 12px;
        color: #7a808a;
      }
      hr {
        border: none;
        border-top: 1px solid rgba(0, 0, 0, 0.08);
        margin: 2px 0;
        width: 100%;
      }
      table {
        font-size: 11.5px;
        border-collapse: collapse;
        width: 100%;
      }
      td,
      th {
        border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        padding: 3px 4px;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/study/main.ts"></script>
  </body>
</html>
